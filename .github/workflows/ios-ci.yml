name: iOS CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Pin Xcode to the latest stable version that GitHub keeps preinstalled.
  # macos-15 ships with Xcode 16.x, which contains the iPhone 16 / iOS 18 simulator.
  XCODE_VERSION: 'latest-stable'
  WORKING_DIR: ios/ColoringBook
  SCHEME: ColoringBook
  # iPhone 16 family + iOS 18 are reliably available on macos-15 GitHub runners.
  IPHONE_DESTINATION: 'platform=iOS Simulator,name=iPhone 16,OS=latest'
  IPAD_DESTINATION: 'platform=iOS Simulator,name=iPad (10th generation),OS=latest'

jobs:
  unit-tests:
    name: iPhone unit tests
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/ColoringBook/project.yml', 'ios/ColoringBook/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.WORKING_DIR }}
        run: xcodegen generate

      - name: Resolve package dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ColoringBook.xcodeproj \
            -scheme "$SCHEME"

      - name: Pick simulator destination
        id: dest
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          # Verify the configured destination resolves; if not, fall back to any available iPhone simulator.
          if xcodebuild -showdestinations -project ColoringBook.xcodeproj -scheme "$SCHEME" 2>/dev/null \
              | grep -F "name:iPhone 16" >/dev/null; then
            echo "destination=$IPHONE_DESTINATION" >> "$GITHUB_OUTPUT"
          else
            FALLBACK=$(xcrun simctl list devices available -j \
              | python3 -c "import json,sys; data=json.load(sys.stdin); \
                            ds=[d for runtime,devs in data['devices'].items() if 'iOS' in runtime \
                                for d in devs if d.get('isAvailable') and 'iPhone' in d.get('name','')]; \
                            print(ds[-1]['name'] if ds else '')")
            if [ -z "$FALLBACK" ]; then
              echo "::error::No iPhone simulator available on this runner"
              exit 1
            fi
            echo "destination=platform=iOS Simulator,name=$FALLBACK,OS=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Run unit tests
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project ColoringBook.xcodeproj \
            -scheme "$SCHEME" \
            -destination "${{ steps.dest.outputs.destination }}" \
            -only-testing:ColoringBookTests \
            -resultBundlePath build/UnitTests.xcresult \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-unit-test-results
          if-no-files-found: warn
          path: ${{ env.WORKING_DIR }}/build/UnitTests.xcresult

  ui-tests:
    name: iPhone UI tests
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/ColoringBook/project.yml', 'ios/ColoringBook/Package.swift') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.WORKING_DIR }}
        run: xcodegen generate

      - name: Resolve package dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ColoringBook.xcodeproj \
            -scheme "$SCHEME"

      - name: Pick simulator destination
        id: dest
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if xcodebuild -showdestinations -project ColoringBook.xcodeproj -scheme "$SCHEME" 2>/dev/null \
              | grep -F "name:iPhone 16" >/dev/null; then
            echo "destination=$IPHONE_DESTINATION" >> "$GITHUB_OUTPUT"
          else
            FALLBACK=$(xcrun simctl list devices available -j \
              | python3 -c "import json,sys; data=json.load(sys.stdin); \
                            ds=[d for runtime,devs in data['devices'].items() if 'iOS' in runtime \
                                for d in devs if d.get('isAvailable') and 'iPhone' in d.get('name','')]; \
                            print(ds[-1]['name'] if ds else '')")
            if [ -z "$FALLBACK" ]; then
              echo "::error::No iPhone simulator available on this runner"
              exit 1
            fi
            echo "destination=platform=iOS Simulator,name=$FALLBACK,OS=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Run UI tests
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -o pipefail
          xcodebuild test \
            -project ColoringBook.xcodeproj \
            -scheme "$SCHEME" \
            -destination "${{ steps.dest.outputs.destination }}" \
            -only-testing:ColoringBookUITests \
            -resultBundlePath build/UITests.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload UI test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-ui-test-results
          if-no-files-found: warn
          path: ${{ env.WORKING_DIR }}/build/UITests.xcresult

  build-iphone:
    name: Build iPhone app
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.WORKING_DIR }}
        run: xcodegen generate

      - name: Build iPhone app
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project ColoringBook.xcodeproj \
            -scheme "$SCHEME" \
            -destination "$IPHONE_DESTINATION" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  build-ipad:
    name: Build iPad app
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ${{ env.WORKING_DIR }}
        run: xcodegen generate

      - name: Pick iPad simulator destination
        id: dest
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          if xcodebuild -showdestinations -project ColoringBook.xcodeproj -scheme "$SCHEME" 2>/dev/null \
              | grep -F "name:iPad (10th generation)" >/dev/null; then
            echo "destination=$IPAD_DESTINATION" >> "$GITHUB_OUTPUT"
          else
            FALLBACK=$(xcrun simctl list devices available -j \
              | python3 -c "import json,sys; data=json.load(sys.stdin); \
                            ds=[d for runtime,devs in data['devices'].items() if 'iOS' in runtime \
                                for d in devs if d.get('isAvailable') and 'iPad' in d.get('name','')]; \
                            print(ds[-1]['name'] if ds else '')")
            if [ -z "$FALLBACK" ]; then
              echo "::error::No iPad simulator available on this runner"
              exit 1
            fi
            echo "destination=platform=iOS Simulator,name=$FALLBACK,OS=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build iPad app
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project ColoringBook.xcodeproj \
            -scheme "$SCHEME" \
            -destination "${{ steps.dest.outputs.destination }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  lint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        working-directory: ${{ env.WORKING_DIR }}
        run: swiftlint lint --reporter github-actions-logging
