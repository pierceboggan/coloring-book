name: iOS CI/CD

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'ios/**'
      - '.github/workflows/ios-ci.yml'

env:
  XCODE_VERSION: '15.0'

concurrency:
  group: ios-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  unit-tests:
    name: iPhone unit tests
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ env.XCODE_VERSION }}

    - name: Cache SPM dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData
          ios/ColoringBook/.build
        key: ${{ runner.os }}-spm-${{ hashFiles('ios/ColoringBook/Package.swift', 'ios/ColoringBook/project.yml') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      working-directory: ios/ColoringBook
      run: xcodegen generate

    - name: Resolve package dependencies
      working-directory: ios/ColoringBook
      run: |
        xcodebuild -resolvePackageDependencies -scheme ColoringBook

    - name: Run unit tests
      working-directory: ios/ColoringBook
      run: |
        xcodebuild test \
          -scheme ColoringBook \
          -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
          -only-testing:ColoringBookTests \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Upload unit test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-unit-test-results
        if-no-files-found: ignore
        path: |
          ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

  ui-tests:
    name: iPhone UI tests
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ env.XCODE_VERSION }}

    - name: Cache SPM dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData
          ios/ColoringBook/.build
        key: ${{ runner.os }}-spm-${{ hashFiles('ios/ColoringBook/Package.swift', 'ios/ColoringBook/project.yml') }}
        restore-keys: |
          ${{ runner.os }}-spm-

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      working-directory: ios/ColoringBook
      run: xcodegen generate

    - name: Resolve package dependencies
      working-directory: ios/ColoringBook
      run: |
        xcodebuild -resolvePackageDependencies -scheme ColoringBook

    - name: Run UI tests
      working-directory: ios/ColoringBook
      run: |
        xcodebuild test \
          -scheme ColoringBook \
          -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
          -only-testing:ColoringBookUITests \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

    - name: Upload UI test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ios-ui-test-results
        if-no-files-found: ignore
        path: |
          ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

  build-iphone:
    name: Build iPhone app
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ env.XCODE_VERSION }}

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      working-directory: ios/ColoringBook
      run: xcodegen generate

    - name: Build iPhone app
      working-directory: ios/ColoringBook
      run: |
        xcodebuild clean build \
          -scheme ColoringBook \
          -destination 'platform=iOS Simulator,name=iPhone 15 Pro' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO

  lint:
    name: Lint Swift Code
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SwiftLint
      run: |
        brew install swiftlint

    - name: Run SwiftLint
      working-directory: ios/ColoringBook
      run: |
        swiftlint lint --reporter github-actions-logging

  build-ipad:
    name: Build for iPad
    runs-on: macos-14

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ env.XCODE_VERSION }}

    - name: Install XcodeGen
      run: brew install xcodegen

    - name: Generate Xcode project
      working-directory: ios/ColoringBook
      run: xcodegen generate

    - name: Build iPad Version
      working-directory: ios/ColoringBook
      run: |
        xcodebuild clean build \
          -scheme ColoringBook \
          -destination 'platform=iOS Simulator,name=iPad Pro (12.9-inch) (6th generation)' \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO
